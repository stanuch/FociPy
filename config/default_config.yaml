# Default configuration for the FociPy analysis pipeline.
# Copy this file and adjust parameters for your specific experiment.

# --- Nuclear Segmentation ---
segmentation:
  method: cellpose           # Options: "cellpose", "otsu_watershed"

  # Cellpose parameters (used when method = "cellpose")
  cellpose_model: nuclei     # Pretrained model type
  cellpose_diameter: null     # Nucleus diameter in pixels (null = auto-detect)

  # Otsu + Watershed parameters (used when method = "otsu_watershed")
  gaussian_sigma: 1.5        # Gaussian blur sigma for noise reduction
  min_distance: 20           # Min distance between nuclei centers (px)

# --- XRCC1 Foci Detection ---
detection:
  method: dog                # Options: "dog", "log", "local_maxima"

  # Difference of Gaussians parameters
  sigma_low: 1.0             # ~0.5x expected focus radius (px)
  sigma_high: 3.0            # ~1.5-2x expected focus radius (px)

  # Detection threshold and spacing
  threshold: 0.05            # Min normalized intensity for a detected focus
  min_distance: 5            # Min distance between foci (px)

# --- Nucleus Filtering ---
filtering:
  min_area_um2: 30.0         # Exclude nuclei smaller than this (debris)
  max_area_um2: 300.0        # Exclude nuclei larger than this (clumps)
  exclude_border: true       # Exclude nuclei touching image edges
  min_solidity: 0.8          # Exclude irregularly shaped nuclei
  max_eccentricity: 0.95     # Exclude very elongated objects

# --- Microscopy Metadata ---
pixel_size_um: 0.325         # Pixel size in micrometers (from microscope)
