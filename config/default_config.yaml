# FociPy — default pipeline configuration

microscope_model: "Leica TCS SP5 FLIM"
objective: "HCX PL APO 63x/1.40 OIL"
laser_wavelength_nm: 488
dapi_channel: 0
protein_channel: 1
time_interval_s: null  # null = read from file metadata

segmentation:
  method: "otsu_watershed"
  gaussian_sigma: 2.0
  min_area_px: 500
  max_area_px: 50000

kinetics:
  roi_radius_px: 15
  drift_correction: true
  background_method: "outside_nuclei"

preprocessing:
  apply_gaussian: true
  gaussian_sigma: 1.0

output:
  export_qc_images: true
  export_kinetics_csv: true
  qc_dpi: 150
